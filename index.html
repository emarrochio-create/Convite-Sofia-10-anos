
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia faz 10 - Neon Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #39ff14;
            --dark-bg: #0d0d0d;
        }

        body {
            background-color: var(--dark-bg);
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .neon-title {
            font-family: 'Orbitron', sans-serif;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-pink),
                0 0 30px var(--neon-pink),
                0 0 40px var(--neon-pink);
            animation: flicker 1.5s infinite alternate;
        }

        .neon-border {
            border: 4px solid #fff;
            box-shadow:
                0 0 10px #fff,
                inset 0 0 10px #fff,
                0 0 20px var(--neon-blue),
                inset 0 0 20px var(--neon-blue);
        }

        .glow-green {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .glow-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow:
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px var(--neon-pink),
                    0 0 40px var(--neon-pink);
            }
            20%, 22%, 24%, 55% {
                text-shadow: none;
                opacity: 0.8;
            }
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            opacity: 0.5;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -30px); }
        }

        .btn-action {
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px currentColor;
        }

        /* Loading Animation */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--neon-blue);
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 50;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 py-12">

    <!-- Background Elements -->
    <div class="floating-circle w-64 h-64 bg-pink-500 top-10 -left-20"></div>
    <div class="floating-circle w-80 h-80 bg-blue-600 bottom-10 -right-20" style="animation-delay: 2s;"></div>
    <div class="floating-circle w-40 h-40 bg-green-500 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2" style="animation-delay: 4s;"></div>

    <!-- Invitation Card -->
    <div class="max-w-md w-full bg-black/80 backdrop-blur-md p-8 rounded-3xl neon-border text-center relative overflow-hidden">

        <p class="uppercase tracking-[0.3em] text-sm mb-2 glow-blue">Let's Party!</p>

        <h2 class="text-4xl font-black mb-1">SOFIA</h2>
        <h1 class="neon-title text-6xl font-black mb-4">FAZ 10</h1>

        <div class="h-1 w-24 bg-white mx-auto mb-6 shadow-[0_0_10px_#fff]"></div>

        <p class="text-lg mb-8 leading-relaxed">
            Prepare seu melhor look <span class="glow-green font-bold">NEON</span> e venha brilhar em uma noite inesquecível!
        </p>

        <!-- Details Grid -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="p-3 border border-white/20 rounded-xl">
                <p class="text-xs uppercase text-gray-400">Data</p>
                <p class="text-xl font-bold glow-blue">16 MAIO</p>
                <p class="text-sm">Sábado, 2026</p>
            </div>
            <div class="p-3 border border-white/20 rounded-xl">
                <p class="text-xs uppercase text-gray-400">Hora</p>
                <p class="text-xl font-bold glow-green">19:00H</p>
                <p class="text-sm">Início da festa</p>
            </div>
        </div>

        <!-- Location -->
        <div class="mb-8">
            <p class="text-xs uppercase text-gray-400 mb-1">Local</p>
            <p class="font-bold text-lg">Salão de festas - Reserva Marajoara</p>
            <p class="text-sm text-gray-300">Av. Dr. Adilson Rodrigues, 3456</p>
            <p class="text-xs text-gray-400">Jundiaí - SP</p>
        </div>

        <!-- Standard Actions -->
        <div class="space-y-4 mb-8">
            <a href="https://www.google.com/maps/search/?api=1&query=Av+Dr+Adilson+Rodrigues+3456+Jundiai" target="_blank"
               class="block w-full py-4 rounded-full border-2 border-[#00ffff] text-[#00ffff] btn-action hover:bg-[#00ffff] hover:text-black">
                Ver Localização
            </a>

            <!-- Botão Atualizado para Google Forms -->
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSfOAxe2LnJUrr4fp2Kip_MQtkBUjXiRMe_MbXRDTtPLGDpxuQ/viewform?usp=header" id="rsvpBtn" target="_blank"
               class="block w-full py-4 rounded-full bg-[#ff00ff] text-white btn-action shadow-[0_0_15px_#ff00ff]">
                Confirmar Presença
            </a>
        </div>

        
    </script>
</body>
</html>
